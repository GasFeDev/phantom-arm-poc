name: phantom-arm-poc
on:
  workflow_dispatch:
  push:
    paths: ['.github/workflows/poc.yml']

jobs:
  poc:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 40
    steps:
      - name: Runner info
        run: |
          uname -m
          nproc; free -h | head -2
          grep -i binder /proc/filesystems || echo "no binderfs in /proc/filesystems"
          ls /lib/modules/$(uname -r)/kernel/drivers/android/ 2>/dev/null || echo "no android drivers dir"

      - name: Fetch Phantom APK (from release asset)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          mkdir -p phantom_apks
          gh release download apk-v26.21.0 --repo ${{ github.repository }} -D phantom_apks -p '*.apk'
          ls -la phantom_apks/

      - name: Setup adb + binder
        run: |
          mkdir -p results
          sudo apt-get update -qq && sudo apt-get install -y -qq adb
          adb version | head -1
          echo "--- binder module ---" | tee results/binder.txt
          sudo modprobe binder_linux devices="binder,hwbinder,vndbinder" 2>&1 | tee -a results/binder.txt || echo "modprobe failed" | tee -a results/binder.txt
          echo "--- /proc/filesystems ---" | tee -a results/binder.txt
          grep -i binder /proc/filesystems | tee -a results/binder.txt || echo "no binderfs" | tee -a results/binder.txt
          echo "--- /dev/binder* ---" | tee -a results/binder.txt
          ls -la /dev/binder /dev/hwbinder /dev/vndbinder 2>&1 | tee -a results/binder.txt || true
          echo "--- kernel modules ---" | tee -a results/binder.txt
          ls /lib/modules/$(uname -r)/kernel/drivers/android/ 2>&1 | tee -a results/binder.txt || echo "no android drivers" | tee -a results/binder.txt

      - name: Boot redroid arm64 (native) + install Phantom
        run: |
          set +e
          A(){ timeout 12 adb -s localhost:5555 "$@"; }
          mkdir -p results $PWD/rd-data
          docker run -itd --privileged --name redroid -v $PWD/rd-data:/data -p 5555:5555 redroid/redroid:14.0.0-latest androidboot.hardware=redroid 2>&1 | tee results/dockerrun.txt
          sleep 12
          docker ps -a --filter name=redroid --format '{{.Status}}' | tee results/container_status.txt
          docker logs redroid > results/redroid_boot.log 2>&1
          echo "=== redroid boot log (tail) ==="; tail -25 results/redroid_boot.log
          # wait boot with per-call timeout
          BOOTED=no
          for i in $(seq 1 45); do
            timeout 8 adb connect localhost:5555 >/dev/null 2>&1
            B=$(A shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            echo "iter $i boot=$B container=$(docker ps --filter name=redroid --format '{{.Names}}')"
            if [ "$B" = "1" ]; then BOOTED=yes; break; fi
            if ! docker ps --filter name=redroid --format '{{.Names}}' | grep -q redroid; then echo "CONTAINER DIED"; break; fi
            sleep 6
          done
          docker logs redroid > results/redroid_boot.log 2>&1
          echo "BOOTED=$BOOTED" | tee results/booted.txt
          A shell getprop ro.product.cpu.abi | tee results/abi.txt
          if [ "$BOOTED" = "yes" ]; then
            A install-multiple -r --bypass-low-target-sdk-block phantom_apks/*.apk 2>&1 | tee results/install.txt
            A shell dumpsys package app.phantom 2>/dev/null | grep -E "versionName|primaryCpuAbi" | tee results/pkg.txt
            A logcat -c
            A shell monkey -p app.phantom -c android.intent.category.LAUNCHER 1
            sleep 30
            echo "PID=$(A shell pidof app.phantom | tr -d '\r')" | tee results/pid.txt
            A exec-out screencap -p > results/launch.png
            A logcat -d > results/logcat_full.txt 2>&1
            grep -iE "SIGSEGV|FATAL|soloader|libreactnative|app.phantom|AndroidRuntime" results/logcat_full.txt | tail -40 > results/logcat_phantom.txt
            if [ -n "$(A shell pidof app.phantom | tr -d '\r')" ]; then echo "PHANTOM_RUNS=YES" | tee results/verdict.txt; else echo "PHANTOM_RUNS=NO" | tee results/verdict.txt; fi
          else
            echo "PHANTOM_RUNS=UNKNOWN (redroid did not boot)" | tee results/verdict.txt
          fi
          echo "step done"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: poc-results
          path: results/
